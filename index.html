<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Industrial SCADA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark text-light">

    <header class="container text-center mt-4 mb-5">
        <h1 class="display-4 text-primary">SISTEMA SCADA v1.0</h1>
        <p class="lead">Monitoramento Industrial em Tempo Real</p>
    </header>

    <main class="container">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card bg-secondary text-white border-primary">

                    <div class="card-header text-center border-primary">
                        <strong>PAINEL DE CONTROLE</strong>
                    </div>

                    <div class="card-body">

                        <h5>Acesso do Operador</h5>

                        <input type="text"
                               id="nomeOperador"
                               class="form-control mb-2"
                               placeholder="Digite seu nome">

                        <button class="btn btn-primary w-100 mb-3"
                                onclick="validarAcesso()">
                            ENTRAR
                        </button>

                        <p id="mensagem"></p>

                        <div id="painel" class="d-none">

                            <hr>

                            <h5>Máquinas</h5>

                            <select id="listaMaquinas"
                                    class="form-select mb-3"
                                    onchange="verificarStatus()">
                            </select>

                            <div id="statusMaquina"
                                 class="alert alert-dark">
                                Selecione uma máquina
                            </div>

                            <hr>

                            <h5>Sensor de Temperatura</h5>

                            <h1 id="temperatura" class="display-4">
                                --°C
                            </h1>

                            <div id="situacao"
                                 class="badge bg-success">
                                Normal
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
